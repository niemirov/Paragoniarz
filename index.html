  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { PieChart, Pie, Cell, BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, Legend } = window.Recharts;

/* ─── localStorage wrapper (replaces window.storage) ─── */
const Storage = {
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e) { console.error("Storage.get error:", e); return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e) { console.error("Storage.set error:", e); return false; }
  },
  remove(key) {
    try { localStorage.removeItem(key); return true; }
    catch(e) { return false; }
  }
};

/* ─── constants ─── */
const CAT_COLORS = {
  "Spożywcze":"#f97316","Mięso/Wędliny":"#dc2626","Nabiał":"#fbbf24",
  "Pieczywo":"#d97706","Warzywa/Owoce":"#22c55e","Napoje":"#06b6d4",
  "Alkohol":"#7c3aed","Słodycze":"#ec4899","Chemia":"#14b8a6",
  "Kosmetyki":"#a855f7","Elektronika":"#3b82f6","Odzież":"#8b5cf6",
  "Transport":"#0ea5e9","Restauracja":"#e11d48","Zdrowie":"#10b981",
  "Rozrywka":"#f43f5e","Subskrypcje":"#6366f1","Dom":"#64748b","Inne":"#94a3b8"
};
const CATS = Object.keys(CAT_COLORS);
const OWNERS = ["Ja", "Ona", "Wspólne"];
const MONTHS_PL = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];
const FREQ_LABELS = { monthly:"Miesięcznie", weekly:"Tygodniowo", yearly:"Rocznie", quarterly:"Kwartalnie" };

const fmt = v => Number(v||0).toFixed(2).replace(".",",") + " zł";
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

/* ─── theme ─── */
const T = {
  bg:"#0a0d1a", card:"#12162a", card2:"#181d35", accent:"#f97316", accent2:"#ea580c",
  text1:"#f1f5f9", text2:"#7c8db5", text3:"#4a5578", border:"#1c2340", border2:"#252d4a",
  green:"#22c55e", red:"#ef4444", yellow:"#fbbf24", blue:"#3b82f6", purple:"#8b5cf6", pink:"#ec4899"
};

/* ─── reusable components ─── */
const Pill = ({color,label}) => (
  <span style={{display:"inline-block",fontSize:10,padding:"2px 8px",borderRadius:99,background:color+"20",color,fontWeight:600,letterSpacing:"0.2px"}}>{label}</span>
);

const Btn = ({active,children,style:s,...p}) => (
  <button {...p} style={{
    padding:"8px 16px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
    background:active?`linear-gradient(135deg,${T.accent},${T.accent2})`:T.border,
    color:active?"#fff":T.text2,transition:"all .2s",letterSpacing:"-0.2px",...s
  }}>{children}</button>
);

const Select = ({style:s,...p}) => (
  <select {...p} style={{background:T.border,color:T.text1,border:"1px solid "+T.border2,borderRadius:10,padding:"8px 12px",fontSize:12,outline:"none",appearance:"none",backgroundImage:`url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%237c8db5' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 10px center",paddingRight:28,...s}} />
);

const Input = ({style:s,...p}) => (
  <input {...p} style={{background:T.border,color:T.text1,border:"1px solid "+T.border2,borderRadius:10,padding:"10px 14px",fontSize:13,outline:"none",width:"100%",transition:"border-color .2s",...s}} />
);

const Card = ({children,style:s,...p}) => (
  <div {...p} style={{background:T.card,borderRadius:16,border:"1px solid "+T.border,...s}}>{children}</div>
);

const SectionTitle = ({icon,children}) => (
  <div style={{fontSize:14,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6,letterSpacing:"-0.3px"}}>
    <span style={{fontSize:16}}>{icon}</span>{children}
  </div>
);

/* ─── main app ─── */
function FinanseApp() {
  /* state: data */
  const [receipts, setReceipts] = useState([]);
  const [recurring, setRecurring] = useState([]);
  const [shoppingList, setShoppingList] = useState([]);
  const [loading, setLoading] = useState(true);

  /* state: UI */
  const [scanning, setScanning] = useState(false);
  const [scanMsg, setScanMsg] = useState("");
  const [tab, setTab] = useState("dashboard");
  const [filterOwner, setFilterOwner] = useState("Wszyscy");
  const [filterMonth, setFilterMonth] = useState("all");
  const [filterCat, setFilterCat] = useState("all");
  const [viewMode, setViewMode] = useState("categories");
  const [expandedId, setExpandedId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [showManual, setShowManual] = useState(false);
  const [showRecurringForm, setShowRecurringForm] = useState(false);
  const [sortBy, setSortBy] = useState("date-desc");
  const [editingItem, setEditingItem] = useState(null);
  const [newShopItem, setNewShopItem] = useState("");
  const [manualForm, setManualForm] = useState({ store:"",date:"",owner:"Ja",total:"",items:[{name:"",price:"",qty:1,category:"Spożywcze"}] });
  const [recurForm, setRecurForm] = useState({ name:"",amount:"",category:"Subskrypcje",frequency:"monthly",owner:"Wspólne" });
  const [trendCats, setTrendCats] = useState(["all"]);
  const [searchQuery, setSearchQuery] = useState("");
  const [filterYear, setFilterYear] = useState("all");
  const [scanPreview, setScanPreview] = useState(null);
  const [apiKey, setApiKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  const fileRef = useRef(null);

  /* ─── PWA install prompt ─── */
  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
      // Show banner if not installed and not dismissed
      if (!localStorage.getItem('pwa-install-dismissed')) {
        setShowInstallBanner(true);
      }
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const installPWA = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      setShowInstallBanner(false);
    }
    setDeferredPrompt(null);
  };

  const dismissInstall = () => {
    setShowInstallBanner(false);
    localStorage.setItem('pwa-install-dismissed', 'true');
  };

  /* ─── storage ─── */
  useEffect(() => {
    try {
      const rData = Storage.get("fin-receipts");
      const recData = Storage.get("fin-recurring");
      const shopData = Storage.get("fin-shopping");
      if (rData) setReceipts(rData);
      if (recData) setRecurring(recData);
      if (shopData) setShoppingList(shopData);

      // Load API key
      const savedKey = localStorage.getItem("fin-api-key");
      if (savedKey) setApiKey(savedKey);
    } catch(e) { console.log("Fresh start"); }
    setLoading(false);
  }, []);

  const saveReceipts = useCallback((data) => {
    setReceipts(data);
    Storage.set("fin-receipts", data);
  }, []);
  const saveRecurring = useCallback((data) => {
    setRecurring(data);
    Storage.set("fin-recurring", data);
  }, []);
  const saveShoppingList = useCallback((data) => {
    setShoppingList(data);
    Storage.set("fin-shopping", data);
  }, []);

  const saveApiKey = (key) => {
    setApiKey(key);
    if (key) localStorage.setItem("fin-api-key", key);
    else localStorage.removeItem("fin-api-key");
  };

  /* ─── Data export/import ─── */
  const exportData = () => {
    const data = {
      receipts, recurring, shoppingList,
      exportedAt: new Date().toISOString(),
      version: 1
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `finanse-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.receipts) saveReceipts(data.receipts);
        if (data.recurring) saveRecurring(data.recurring);
        if (data.shoppingList) saveShoppingList(data.shoppingList);
        alert("Import zakończony! Wczytano " + (data.receipts?.length||0) + " paragonów.");
      } catch(err) {
        alert("Błąd importu: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  /* ─── AI scan (Gemini API) ─── */
  const scanReceipt = async (base64, mime) => {
    if (!apiKey) {
      setShowSettings(true);
      setScanMsg("");
      setScanning(false);
      return;
    }
    setScanning(true);
    setScanMsg("AI analizuje paragon...");
    try {
      const geminiModel = "gemini-2.5-flash";
      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              parts: [
                { inlineData: { mimeType: mime, data: base64 } },
                { text: `Przeanalizuj ten paragon/rachunek. Odpowiedz WYŁĄCZNIE poprawnym JSON (bez markdown, bez backticks):
{
  "store": "nazwa sklepu",
  "date": "YYYY-MM-DD",
  "total": 0.00,
  "quality": "good|partial|poor",
  "warnings": ["opis problemu 1"],
  "items": [
    {"name": "nazwa produktu", "price": 0.00, "qty": 1, "category": "kategoria"}
  ]
}

WAŻNE ZASADY:
- "quality": oceń jakość zdjęcia i czytelność paragonu:
  * "good" = wszystko czytelne, pełne dane
  * "partial" = część pozycji nieczytelna, ale da się odczytać większość
  * "poor" = zdjęcie za ciemne/rozmazane/przycięte, nie da się rzetelnie odczytać
- "warnings": tablica z opisami problemów po polsku (może być pusta []).
- Jeśli quality="poor" i nie da się odczytać żadnych danych → zwróć {"error":"Zdjęcie jest zbyt nieczytelne. Spróbuj zrobić wyraźniejsze zdjęcie w lepszym oświetleniu.","quality":"poor"}
- Jeśli quality="partial" — dodaj to co się da odczytać, w warnings opisz co pominąłeś.
- "price" to cena JEDNOSTKOWA PO RABACIE za 1 sztukę w PLN. Jeśli jest linia "OPUST"/"RABAT" pod produktem, MUSISZ odjąć rabat.
- NIE wpisuj kodów kreskowych, NIP, nr paragonu jako ceny.
- "qty" = ilość sztuk (>=1). "total" = SUMA PLN / DO ZAPŁATY.
- KRYTYCZNE: Suma (price×qty) MUSI ≈ total. Jeśli nie — sprawdź rabaty.
- Kategorie: ${CATS.join(", ")}.` }
              ]
            }],
            generationConfig: { temperature: 0.1 }
          })
        }
      );
      const data = await resp.json();
      if (data.error) {
        setScanMsg("❌ API Error: " + (data.error.message || JSON.stringify(data.error)));
        setTimeout(()=>{setScanning(false);setScanMsg("");},5000); return;
      }
      const text = (data.candidates?.[0]?.content?.parts || []).map(p => p.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (parsed.error) { setScanMsg("⚠️ " + parsed.error); setTimeout(()=>{setScanning(false);setScanMsg("");},5000); return; }
      if (parsed.quality === "poor" && (!parsed.items || parsed.items.length === 0)) {
        setScanMsg("📷 Zdjęcie jest zbyt nieczytelne.\nSpróbuj zrobić wyraźniejsze zdjęcie\nw lepszym oświetleniu.");
        setTimeout(()=>{setScanning(false);setScanMsg("");},5000); return;
      }
      const warnings = parsed.warnings || [];
      const newR = {
        id: genId(), store: parsed.store||"Nieznany", date: parsed.date||new Date().toISOString().slice(0,10),
        total: parsed.total||0, owner:"Ja",
        items: (parsed.items||[]).map(it => {
          let price = Number(it.price)||0;
          if (price > 5000) price = 0;
          return { name:it.name, price, qty:Math.max(1,Math.round(Number(it.qty)||1)), category:CATS.includes(it.category)?it.category:"Inne" };
        }),
        addedAt: new Date().toISOString(), warnings: warnings.length>0?warnings:undefined, quality: parsed.quality||"good"
      };
      const itemsSum = newR.items.reduce((s,i)=>s+i.price*i.qty,0);
      if (!newR.total||newR.total<=0) newR.total = itemsSum;
      if (itemsSum>0 && newR.total>0) {
        const ratio = itemsSum/newR.total;
        if (ratio>1.10||ratio<0.90) {
          const scale = newR.total/itemsSum;
          newR.items = newR.items.map(it=>({...it,price:Math.round(it.price*scale*100)/100}));
        }
      }
      setScanPreview(newR);
      setScanning(false);
      setScanMsg("");
    } catch(e) {
      console.error(e);
      setScanMsg("❌ Błąd: "+e.message);
      setTimeout(()=>{setScanning(false);setScanMsg("");},4000);
    }
  };

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";
    if (!apiKey) {
      setShowSettings(true);
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      scanReceipt(result.split(",")[1], result.split(";")[0].split(":")[1]);
    };
    reader.readAsDataURL(file);
  };

  /* ─── scan preview helpers ─── */
  const acceptScan = () => {
    if (!scanPreview) return;
    saveReceipts([scanPreview,...receipts]);
    setScanPreview(null);
    setTab("receipts");
  };
  const rejectScan = () => { setScanPreview(null); };
  const updatePreviewField = (field, value) => {
    setScanPreview(prev => ({...prev, [field]: value}));
  };
  const updatePreviewItem = (idx, field, value) => {
    setScanPreview(prev => {
      const items = [...(prev.items||[])];
      items[idx] = {...items[idx],[field]:field==="price"?Number(value)||0:field==="qty"?Math.max(1,Number(value)||1):value};
      const total = items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
      return {...prev, items, total};
    });
  };
  const removePreviewItem = (idx) => {
    setScanPreview(prev => {
      const items = prev.items.filter((_,i)=>i!==idx);
      const total = items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
      return {...prev, items, total};
    });
  };

  /* ─── manual add ─── */
  const addManual = () => {
    const r = {
      id:genId(), store:manualForm.store||"Ręczny wpis", date:manualForm.date||new Date().toISOString().slice(0,10),
      total:Number(manualForm.total)||manualForm.items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0),
      owner:manualForm.owner,
      items:manualForm.items.filter(i=>i.name).map(i=>({name:i.name,price:Number(i.price)||0,qty:Number(i.qty)||1,category:i.category})),
      addedAt:new Date().toISOString()
    };
    saveReceipts([r,...receipts]);
    setShowManual(false);
    setManualForm({store:"",date:"",owner:"Ja",total:"",items:[{name:"",price:"",qty:1,category:"Spożywcze"}]});
    setTab("receipts");
  };

  /* ─── recurring ─── */
  const addRecurring = () => {
    if (!recurForm.name || !recurForm.amount) return;
    const item = { id:genId(), name:recurForm.name, amount:Number(recurForm.amount), category:recurForm.category, frequency:recurForm.frequency, owner:recurForm.owner, active:true };
    saveRecurring([...recurring, item]);
    setShowRecurringForm(false);
    setRecurForm({name:"",amount:"",category:"Subskrypcje",frequency:"monthly",owner:"Wspólne"});
  };

  const toggleRecurring = (id) => {
    saveRecurring(recurring.map(r=>r.id===id?{...r,active:!r.active}:r));
  };

  const deleteRecurring = (id) => {
    saveRecurring(recurring.filter(r=>r.id!==id));
  };

  const recurringMonthly = useMemo(() => {
    return recurring.filter(r=>r.active).reduce((s,r) => {
      const amt = r.amount||0;
      if (r.frequency==="monthly") return s+amt;
      if (r.frequency==="weekly") return s+amt*4.33;
      if (r.frequency==="quarterly") return s+amt/3;
      if (r.frequency==="yearly") return s+amt/12;
      return s;
    },0);
  },[recurring]);

  /* ─── shopping list ─── */
  const addShopItem = () => {
    if (!newShopItem.trim()) return;
    const updated = [...shoppingList, {id:genId(), name:newShopItem.trim(), checked:false}];
    saveShoppingList(updated);
    setNewShopItem("");
  };

  const toggleShopItem = (id) => {
    saveShoppingList(shoppingList.map(i=>i.id===id?{...i,checked:!i.checked}:i));
  };

  const removeShopItem = (id) => {
    saveShoppingList(shoppingList.filter(i=>i.id!==id));
  };

  const clearChecked = () => {
    saveShoppingList(shoppingList.filter(i=>!i.checked));
  };

  /* ─── edit item ─── */
  const updateItem = (receiptId, itemIdx, field, value) => {
    const updated = receipts.map(r => {
      if (r.id !== receiptId) return r;
      const items = [...(r.items||[])];
      items[itemIdx] = {...items[itemIdx],[field]:field==="price"?Number(value)||0:value};
      const total = items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
      return {...r,items,total};
    });
    saveReceipts(updated);
    setEditingItem(null);
  };

  const changeOwner = (id, o) => {
    saveReceipts(receipts.map(r=>r.id===id?{...r,owner:o}:r));
  };

  /* ─── available years ─── */
  const availableYears = useMemo(() => {
    const years = new Set();
    receipts.forEach(r => { if(r.date) years.add(new Date(r.date).getFullYear()); });
    return [...years].sort((a,b)=>b-a);
  },[receipts]);

  /* ─── filtering & sorting ─── */
  const filtered = useMemo(() => {
    const q = searchQuery.toLowerCase().trim();
    let list = receipts.filter(r => {
      if (filterOwner !== "Wszyscy" && r.owner !== filterOwner) return false;
      const d = new Date(r.date);
      if (filterYear !== "all" && d.getFullYear() !== Number(filterYear)) return false;
      if (filterMonth !== "all" && d.getMonth() !== Number(filterMonth)) return false;
      if (filterCat !== "all" && !(r.items||[]).some(it=>it.category===filterCat)) return false;
      if (q) {
        const storeMatch = (r.store||"").toLowerCase().includes(q);
        const itemMatch = (r.items||[]).some(it=>(it.name||"").toLowerCase().includes(q));
        if (!storeMatch && !itemMatch) return false;
      }
      return true;
    });
    const [key,dir] = sortBy.split("-");
    list.sort((a,b) => {
      let va,vb;
      if (key==="date") { va=a.date; vb=b.date; }
      else if (key==="amount") { va=a.total||0; vb=b.total||0; }
      else if (key==="store") { va=(a.store||"").toLowerCase(); vb=(b.store||"").toLowerCase(); }
      else { va=a.date; vb=b.date; }
      if (va<vb) return dir==="asc"?-1:1;
      if (va>vb) return dir==="asc"?1:-1;
      return 0;
    });
    return list;
  },[receipts,filterOwner,filterYear,filterMonth,filterCat,sortBy,searchQuery]);

  const totalSpent = filtered.reduce((s,r)=>s+(r.total||0),0);

  /* ─── month comparison ─── */
  const monthComparison = useMemo(() => {
    const now = new Date();
    const curMonth = now.getMonth();
    const curYear = now.getFullYear();
    const prevMonth = curMonth === 0 ? 11 : curMonth - 1;
    const prevYear = curMonth === 0 ? curYear - 1 : curYear;
    let curTotal = 0, prevTotal = 0;
    const curCats = {}, prevCats = {};
    receipts.forEach(r => {
      if (filterOwner !== "Wszyscy" && r.owner !== filterOwner) return;
      const d = new Date(r.date);
      const m = d.getMonth(), y = d.getFullYear();
      if (m === curMonth && y === curYear) {
        curTotal += (r.total||0);
        (r.items||[]).forEach(it => { const c=it.category||"Inne"; curCats[c]=(curCats[c]||0)+(it.price||0)*(it.qty||1); });
      }
      if (m === prevMonth && y === prevYear) {
        prevTotal += (r.total||0);
        (r.items||[]).forEach(it => { const c=it.category||"Inne"; prevCats[c]=(prevCats[c]||0)+(it.price||0)*(it.qty||1); });
      }
    });
    const pctChange = prevTotal > 0 ? ((curTotal - prevTotal) / prevTotal * 100) : null;
    const catChanges = [];
    const allCats = new Set([...Object.keys(curCats),...Object.keys(prevCats)]);
    allCats.forEach(c => {
      const cur = curCats[c]||0, prev = prevCats[c]||0;
      if (prev > 0 && cur > 0) {
        const pct = ((cur-prev)/prev*100);
        if (Math.abs(pct) >= 10) catChanges.push({name:c, cur, prev, pct});
      } else if (cur > 20 && prev === 0) {
        catChanges.push({name:c, cur, prev, pct:null, isNew:true});
      }
    });
    catChanges.sort((a,b) => Math.abs(b.pct||999) - Math.abs(a.pct||999));
    return { curTotal, prevTotal, pctChange, curMonth: MONTHS_PL[curMonth], prevMonth: MONTHS_PL[prevMonth], catChanges: catChanges.slice(0,5) };
  },[receipts, filterOwner]);

  /* ─── chart data ─── */
  const catData = useMemo(() => {
    const cd = {};
    filtered.forEach(r=>(r.items||[]).forEach(it=>{
      const cat = it.category||"Inne";
      cd[cat]=(cd[cat]||0)+(it.price||0)*(it.qty||1);
    }));
    return Object.entries(cd).map(([name,value])=>({name,value:Math.round(value*100)/100})).sort((a,b)=>b.value-a.value);
  },[filtered]);

  const barData = useMemo(() => {
    const md = {};
    filtered.forEach(r=>{const m=new Date(r.date).getMonth();md[MONTHS_PL[m]]=(md[MONTHS_PL[m]]||0)+(r.total||0);});
    return MONTHS_PL.map(m=>({name:m,kwota:Math.round((md[m]||0)*100)/100})).filter(d=>d.kwota>0);
  },[filtered]);

  /* ─── trend chart data ─── */
  const trendReceipts = useMemo(() => {
    return receipts.filter(r => {
      if (filterOwner !== "Wszyscy" && r.owner !== filterOwner) return false;
      return true;
    });
  },[receipts, filterOwner]);

  const availableTrendCats = useMemo(() => {
    const cats = new Set();
    trendReceipts.forEach(r=>(r.items||[]).forEach(it=>{ if(it.category) cats.add(it.category); }));
    return CATS.filter(c=>cats.has(c));
  },[trendReceipts]);

  const trendData = useMemo(() => {
    const showAll = trendCats.includes("all");
    const monthMap = {};
    trendReceipts.forEach(r => {
      const m = new Date(r.date).getMonth();
      const mKey = MONTHS_PL[m];
      if (!monthMap[mKey]) monthMap[mKey] = { name: mKey, _total: 0 };
      (r.items||[]).forEach(it => {
        const cat = it.category||"Inne";
        const amt = (it.price||0)*(it.qty||1);
        if (showAll) {
          monthMap[mKey]._total += amt;
        } else if (trendCats.includes(cat)) {
          if (!monthMap[mKey][cat]) monthMap[mKey][cat] = 0;
          monthMap[mKey][cat] += amt;
        }
      });
      if (showAll) {
        monthMap[mKey]["Łącznie"] = Math.round((monthMap[mKey]._total||0)*100)/100;
      }
    });
    Object.values(monthMap).forEach(entry => {
      Object.keys(entry).forEach(k => {
        if (k !== "name" && k !== "_total") entry[k] = Math.round((entry[k]||0)*100)/100;
      });
    });
    return MONTHS_PL.map(m => monthMap[m]).filter(Boolean);
  },[trendReceipts, trendCats]);

  const trendLines = useMemo(() => {
    if (trendCats.includes("all")) return [{ key: "Łącznie", color: T.accent }];
    return trendCats.map(c => ({ key: c, color: CAT_COLORS[c]||"#94a3b8" }));
  },[trendCats]);

  /* ─── loading screen ─── */
  if (loading) return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.text1,fontFamily:"'SF Pro Display',system-ui,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16,animation:"pulse 2s ease infinite"}}>💰</div>
        <div style={{fontSize:13,color:T.text2,letterSpacing:"1px",textTransform:"uppercase"}}>Ładowanie...</div>
      </div>
    </div>
  );

  const TABS = [
    {key:"dashboard",icon:"📊",label:"Panel"},
    {key:"receipts",icon:"🧾",label:"Paragony"},
    {key:"recurring",icon:"🔄",label:"Stałe"},
    {key:"shopping",icon:"🛒",label:"Zakupy"},
  ];

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text1,fontFamily:"'SF Pro Display',system-ui,sans-serif",paddingBottom:80}}>

      {/* ─── HEADER ─── */}
      <div style={{padding:"20px 16px 16px",background:`linear-gradient(160deg, ${T.bg} 0%, #141833 40%, #1a1245 100%)`,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:T.accent+"08"}} />
        <div style={{position:"absolute",bottom:-20,left:-20,width:100,height:100,borderRadius:"50%",background:T.purple+"06"}} />
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
          <div>
            <h1 style={{margin:0,fontSize:24,fontWeight:800,letterSpacing:"-0.8px",background:`linear-gradient(135deg, ${T.text1} 0%, ${T.accent} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Finanse</h1>
            <div style={{fontSize:11,color:T.text3,marginTop:3,letterSpacing:"0.5px"}}>TRACKER WYDATKÓW</div>
          </div>
          <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:22,fontWeight:800,color:T.accent,letterSpacing:"-0.5px"}}>{fmt(totalSpent)}</div>
              <div style={{fontSize:11,color:T.text3,marginTop:1}}>{filtered.length} paragonów{recurring.filter(r=>r.active).length > 0 ? ` · ${fmt(recurringMonthly)}/mies.` : ""}</div>
            </div>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,padding:"2px",marginTop:2,filter:"grayscale(1) brightness(0.6)"}}>⚙️</button>
          </div>
        </div>
      </div>

      {/* ─── SCAN OVERLAY ─── */}
      {scanning && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20,backdropFilter:"blur(8px)"}}>
          <div style={{width:52,height:52,border:`3px solid ${T.accent}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}} />
          <div style={{fontSize:15,color:T.text1,textAlign:"center",padding:"0 24px",whiteSpace:"pre-wrap",maxWidth:340,lineHeight:1.6}}>{scanMsg}</div>
        </div>
      )}

      {/* ─── FAB ─── */}
      <label htmlFor="receipt-upload-input" style={{
        position:"fixed",bottom:80,right:16,zIndex:100,width:56,height:56,borderRadius:"50%",
        background:`linear-gradient(135deg, ${T.accent}, ${T.accent2})`,
        display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",
        boxShadow:`0 4px 24px ${T.accent}50`,fontSize:24,transition:"transform .2s",
      }}>📷</label>
      <input id="receipt-upload-input" ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}} />

      {/* ─── FILTERS ─── */}
      {(tab==="dashboard"||tab==="receipts") && (
        <>
          <div style={{padding:"12px 16px 6px"}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.text3,pointerEvents:"none"}}>🔍</span>
              <Input placeholder="Szukaj sklepu lub produktu..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                style={{paddingLeft:36,fontSize:12,background:T.border,borderRadius:12}} />
              {searchQuery && (
                <button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
              )}
            </div>
          </div>
          <div style={{padding:"4px 16px 8px",display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <Select value={filterOwner} onChange={e=>setFilterOwner(e.target.value)}>
              <option value="Wszyscy">👥 Wszyscy</option>
              {OWNERS.map(o=><option key={o} value={o}>{o}</option>)}
            </Select>
            {availableYears.length > 1 && (
              <Select value={filterYear} onChange={e=>setFilterYear(e.target.value)}>
                <option value="all">📆 Wszystkie lata</option>
                {availableYears.map(y=><option key={y} value={y}>{y}</option>)}
              </Select>
            )}
            <Select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}>
              <option value="all">📅 Cały rok</option>
              {MONTHS_PL.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </Select>
            <Select value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
              <option value="all">🏷 Kategorie</option>
              {CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </Select>
          </div>
        </>
      )}

      {/* ─── SORT BAR ─── */}
      {tab==="receipts" && (
        <div style={{padding:"4px 16px 8px",display:"flex",gap:6,alignItems:"center",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <span style={{fontSize:11,color:T.text3,flexShrink:0}}>Sortuj:</span>
          {[["date-desc","Data ↓"],["date-asc","Data ↑"],["amount-desc","Kwota ↓"],["amount-asc","Kwota ↑"],["store-asc","Sklep A-Z"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSortBy(v)} style={{
              padding:"4px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,flexShrink:0,
              background:sortBy===v?T.accent+"25":T.border,color:sortBy===v?T.accent:T.text3,transition:"all .2s"
            }}>{l}</button>
          ))}
        </div>
      )}

      {/* ─── CONTENT ─── */}
      <div style={{padding:"8px 16px 16px"}}>

        {/* ━━━ DASHBOARD ━━━ */}
        {tab==="dashboard" && (
          <>
            {/* API key warning */}
            {!apiKey && (
              <Card style={{padding:14,marginBottom:14,border:"1px solid "+T.yellow+"40",background:T.yellow+"08"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:24}}>🔑</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.yellow}}>Brak klucza API</div>
                    <div style={{fontSize:11,color:T.text3,marginTop:2}}>Dodaj darmowy klucz Google Gemini w ustawieniach aby skanować paragony</div>
                  </div>
                  <Btn active onClick={()=>setShowSettings(true)} style={{fontSize:11,padding:"6px 12px"}}>Ustaw</Btn>
                </div>
              </Card>
            )}

            {filtered.length === 0 ? (
              <div style={{textAlign:"center",padding:"48px 24px",color:T.text2}}>
                <div style={{fontSize:56,marginBottom:16}}>📷</div>
                <div style={{fontSize:16,fontWeight:700,color:T.text1,marginBottom:8}}>Brak paragonów</div>
                <div style={{fontSize:13,lineHeight:1.5}}>Kliknij przycisk 📷 aby zeskanować<br/>pierwszy paragon</div>
              </div>
            ) : (
              <>
                {/* Stats */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <Card style={{padding:"14px 16px"}}>
                    <div style={{fontSize:11,color:T.text3,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Paragony</div>
                    <div style={{fontSize:22,fontWeight:800,color:T.text1}}>{filtered.length}</div>
                  </Card>
                  <Card style={{padding:"14px 16px"}}>
                    <div style={{fontSize:11,color:T.text3,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Średnia</div>
                    <div style={{fontSize:22,fontWeight:800,color:T.text1}}>{fmt(filtered.length>0?totalSpent/filtered.length:0)}</div>
                  </Card>
                </div>

                {/* Month-over-month comparison */}
                {monthComparison.prevTotal > 0 && (
                  <Card style={{padding:16,marginBottom:14}}>
                    <SectionTitle icon="📅">Porównanie miesięczne</SectionTitle>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{textAlign:"center",flex:1}}>
                        <div style={{fontSize:11,color:T.text3,marginBottom:4}}>{monthComparison.prevMonth}</div>
                        <div style={{fontSize:18,fontWeight:800,color:T.text2}}>{fmt(monthComparison.prevTotal)}</div>
                      </div>
                      <div style={{textAlign:"center",padding:"0 12px"}}>
                        <div style={{
                          fontSize:14,fontWeight:800,
                          color:monthComparison.pctChange > 0 ? T.red : monthComparison.pctChange < 0 ? T.green : T.text3,
                          background:(monthComparison.pctChange > 0 ? T.red : monthComparison.pctChange < 0 ? T.green : T.text3)+"15",
                          padding:"4px 10px",borderRadius:8
                        }}>
                          {monthComparison.pctChange > 0 ? "↑" : monthComparison.pctChange < 0 ? "↓" : "="}{" "}
                          {Math.abs(monthComparison.pctChange).toFixed(0)}%
                        </div>
                      </div>
                      <div style={{textAlign:"center",flex:1}}>
                        <div style={{fontSize:11,color:T.text3,marginBottom:4}}>{monthComparison.curMonth}</div>
                        <div style={{fontSize:18,fontWeight:800,color:T.accent}}>{fmt(monthComparison.curTotal)}</div>
                      </div>
                    </div>
                    {monthComparison.catChanges.length > 0 && (
                      <div style={{borderTop:"1px solid "+T.border,paddingTop:10}}>
                        <div style={{fontSize:11,color:T.text3,marginBottom:8,fontWeight:600}}>Największe zmiany:</div>
                        {monthComparison.catChanges.map((c,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:8,height:8,borderRadius:3,background:CAT_COLORS[c.name]||"#94a3b8"}} />
                              <span style={{color:T.text2}}>{c.name}</span>
                            </div>
                            <span style={{fontWeight:700,fontSize:11,color:c.isNew ? T.blue : c.pct > 0 ? T.red : T.green}}>
                              {c.isNew ? "NOWA" : `${c.pct > 0?"↑":"↓"} ${Math.abs(c.pct).toFixed(0)}%`}
                              {" "}<span style={{color:T.text3,fontWeight:400}}>{fmt(c.cur)}</span>
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                )}

                {/* Toggle */}
                <div style={{display:"flex",gap:6,marginBottom:14}}>
                  <Btn active={viewMode==="categories"} onClick={()=>setViewMode("categories")} style={{flex:1,textAlign:"center"}}>Kategorie</Btn>
                  <Btn active={viewMode==="products"} onClick={()=>setViewMode("products")} style={{flex:1,textAlign:"center"}}>Produkty</Btn>
                </div>

                {/* PIE */}
                <Card style={{padding:16,marginBottom:14}}>
                  <SectionTitle icon="🍩">Wydatki wg kategorii</SectionTitle>
                  {catData.length > 0 ? (
                    <>
                      <ResponsiveContainer width="100%" height={200}>
                        <PieChart>
                          <Pie data={catData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={75} innerRadius={42} paddingAngle={2} stroke="none">
                            {catData.map((d,i) => <Cell key={i} fill={CAT_COLORS[d.name]||"#94a3b8"} />)}
                          </Pie>
                          <Tooltip formatter={v=>fmt(v)} contentStyle={{background:T.card2,border:"1px solid "+T.border2,borderRadius:10,color:T.text1,fontSize:12}} />
                        </PieChart>
                      </ResponsiveContainer>
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px 12px",marginTop:8}}>
                        {catData.slice(0,10).map(d => (
                          <div key={d.name} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                            <div style={{width:8,height:8,borderRadius:3,background:CAT_COLORS[d.name]||"#94a3b8",flexShrink:0}} />
                            <span style={{color:T.text2}}>{d.name}</span>
                            <span style={{color:T.text1,fontWeight:700}}>{fmt(d.value)}</span>
                          </div>
                        ))}
                      </div>
                    </>
                  ) : <div style={{color:T.text3,fontSize:13,textAlign:"center",padding:24}}>Brak danych</div>}
                </Card>

                {/* BAR */}
                {barData.length > 1 && (
                  <Card style={{padding:16,marginBottom:14}}>
                    <SectionTitle icon="📊">Suma miesięczna</SectionTitle>
                    <ResponsiveContainer width="100%" height={150}>
                      <BarChart data={barData}>
                        <XAxis dataKey="name" tick={{fill:T.text3,fontSize:11}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fill:T.text3,fontSize:10}} axisLine={false} tickLine={false} width={45} />
                        <Tooltip formatter={v=>fmt(v)} contentStyle={{background:T.card2,border:"1px solid "+T.border2,borderRadius:10,color:T.text1,fontSize:12}} />
                        <Bar dataKey="kwota" fill={T.accent} radius={[6,6,0,0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>
                )}

                {/* TREND */}
                {trendData.length > 0 && (
                  <Card style={{padding:16,marginBottom:14}}>
                    <SectionTitle icon="📈">Trendy wydatków</SectionTitle>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                      <button onClick={()=>setTrendCats(["all"])} style={{
                        padding:"4px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                        background:trendCats.includes("all")?T.accent+"30":T.border,
                        color:trendCats.includes("all")?T.accent:T.text3,transition:"all .2s"
                      }}>Wszystko</button>
                      {availableTrendCats.map(c=>{
                        const isActive = trendCats.includes(c);
                        return (
                          <button key={c} onClick={()=>{
                            if (trendCats.includes("all")) {
                              setTrendCats([c]);
                            } else if (isActive) {
                              const next = trendCats.filter(x=>x!==c);
                              setTrendCats(next.length===0?["all"]:next);
                            } else {
                              setTrendCats([...trendCats,c]);
                            }
                          }} style={{
                            padding:"4px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                            background:isActive?(CAT_COLORS[c]||"#94a3b8")+"25":T.border,
                            color:isActive?CAT_COLORS[c]||"#94a3b8":T.text3,transition:"all .2s"
                          }}>{c}</button>
                        );
                      })}
                    </div>
                    <ResponsiveContainer width="100%" height={180}>
                      <LineChart data={trendData}>
                        <XAxis dataKey="name" tick={{fill:T.text3,fontSize:11}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fill:T.text3,fontSize:10}} axisLine={false} tickLine={false} width={45} />
                        <Tooltip formatter={v=>fmt(v)} contentStyle={{background:T.card2,border:"1px solid "+T.border2,borderRadius:10,color:T.text1,fontSize:12}} />
                        {trendLines.map(l=>(
                          <Line key={l.key} type="monotone" dataKey={l.key} stroke={l.color} strokeWidth={2.5} dot={{r:3,fill:l.color}} activeDot={{r:5}} />
                        ))}
                        {trendLines.length > 1 && <Legend wrapperStyle={{fontSize:11,color:T.text2}} />}
                      </LineChart>
                    </ResponsiveContainer>
                  </Card>
                )}

                {/* TOP products */}
                {viewMode==="products" && (
                  <Card style={{padding:16,marginBottom:14}}>
                    <SectionTitle icon="🏆">Top produkty</SectionTitle>
                    {(()=>{
                      const prods={};
                      filtered.forEach(r=>(r.items||[]).forEach(it=>{
                        const k=it.name?.toLowerCase();if(!k)return;
                        if(!prods[k])prods[k]={name:it.name,total:0,count:0,category:it.category};
                        prods[k].total+=(it.price||0)*(it.qty||1);prods[k].count+=(it.qty||1);
                      }));
                      return Object.values(prods).sort((a,b)=>b.total-a.total).slice(0,15).map((p,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<14?"1px solid "+T.border:"none"}}>
                          <div>
                            <div style={{fontSize:13}}>{p.name} <span style={{color:T.text3,fontSize:11}}>×{p.count}</span></div>
                            <Pill color={CAT_COLORS[p.category]||"#94a3b8"} label={p.category} />
                          </div>
                          <div style={{fontSize:13,fontWeight:700,color:T.accent}}>{fmt(p.total)}</div>
                        </div>
                      ));
                    })()}
                  </Card>
                )}

                {/* Owner summary */}
                {filterOwner==="Wszyscy" && (
                  <Card style={{padding:16,marginBottom:14}}>
                    <SectionTitle icon="👥">Podział na osoby</SectionTitle>
                    {OWNERS.map(o => {
                      const sum = filtered.filter(r=>r.owner===o).reduce((s,r)=>s+(r.total||0),0);
                      if (sum===0) return null;
                      const pct = totalSpent>0?(sum/totalSpent*100):0;
                      const clr = o==="Ja"?T.blue:o==="Ona"?T.pink:T.purple;
                      return (
                        <div key={o} style={{marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                            <span style={{fontWeight:600}}>{o}</span>

              {/* API Key */}
              <div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>🔑 Klucz API Google Gemini</div>
                <div style={{fontSize:11,color:T.text3,marginBottom:8,lineHeight:1.4}}>
                  Wymagany do skanowania paragonów (darmowy — do 500 skanów/dzień).
                  Klucz jest przechowywany wyłącznie lokalnie na Twoim urządzeniu.
                  Uzyskaj go na <span style={{color:T.accent}}>aistudio.google.com</span> → Get API Key
                </div>
                <Input
                  type="password"
                  placeholder="AIzaSy..."
                  value={apiKey}
                  onChange={e=>saveApiKey(e.target.value)}
                  style={{fontSize:12}}
                />
                {apiKey && (
                  <div style={{fontSize:11,color:T.green,marginTop:4}}>✅ Klucz zapisany</div>
                )}
              </div>

              {/* Data management */}
              <div>
                <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>💾 Zarządzanie danymi</div>
                <div style={{fontSize:11,color:T.text3,marginBottom:8,lineHeight:1.4}}>
                  Eksportuj dane jako backup lub zaimportuj z pliku.
                  Dane: {receipts.length} paragonów, {recurring.length} stałych, {shoppingList.length} na liście zakupów.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn active onClick={exportData} style={{flex:1,textAlign:"center",fontSize:12}}>📤 Eksportuj</Btn>
                  <label style={{flex:1}}>
                    <Btn active={false} style={{width:"100%",textAlign:"center",fontSize:12,cursor:"pointer"}} onClick={()=>{}}>📥 Importuj</Btn>
                    <input type="file" accept=".json" onChange={importData} style={{display:"none"}} />
                  </label>
                </div>
              </div>

              {/* PWA install */}
              {deferredPrompt && (
                <div>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>📱 Zainstaluj aplikację</div>
                  <Btn active onClick={installPWA} style={{width:"100%",textAlign:"center",fontSize:12}}>Zainstaluj na urządzeniu</Btn>
                </div>
              )}

              <Btn active={false} onClick={()=>setShowSettings(false)} style={{textAlign:"center",marginTop:4}}>Zamknij</Btn>
            </div>
          </div>
        </div>
      )}

      {/* ─── PWA INSTALL BANNER ─── */}
      <div className={"pwa-banner" + (showInstallBanner ? " show" : "")}>
        <span style={{fontSize:28}}>📱</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text1}}>Zainstaluj Finanse</div>
          <div style={{fontSize:11,color:T.text3}}>Dodaj do ekranu głównego</div>
        </div>
        <Btn active onClick={installPWA} style={{fontSize:11,padding:"6px 12px"}}>Instaluj</Btn>
        <button onClick={dismissInstall} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
      </div>

      {/* ─── BOTTOM NAV ─── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:T.card+"f0",borderTop:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:90,backdropFilter:"blur(20px)",paddingBottom:"max(4px, env(safe-area-inset-bottom))"}}>
        {TABS.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{
            background:"none",border:"none",cursor:"pointer",textAlign:"center",fontSize:10,fontWeight:700,
            color:tab===t.key?T.accent:T.text3,transition:"color .2s",padding:"6px 0",minWidth:56,letterSpacing:"0.3px"
          }}>
            <div style={{fontSize:22,marginBottom:2,transition:"transform .2s",transform:tab===t.key?"scale(1.15)":"scale(1)"}}>{t.icon}</div>
            {t.label}
            {tab===t.key && <div style={{width:4,height:4,borderRadius:2,background:T.accent,margin:"3px auto 0"}} />}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FinanseApp />);
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
