/* ─── Firebase hooks ─── */
function useFirebaseData(user){
  const[receipts,setReceipts]=useState([]);const[recurring,setRecurring]=useState([]);const[shoppingList,setShoppingList]=useState([]);const[loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!user){setReceipts([]);setRecurring([]);setShoppingList([]);setLoaded(false);return;}
    const uid=user.uid;const rRef=fbDb.ref("users/"+uid+"/receipts");const recRef=fbDb.ref("users/"+uid+"/recurring");const shopRef=fbDb.ref("users/"+uid+"/shopping");
    const onR=rRef.on("value",s=>{setReceipts(s.val()?Object.values(s.val()):[]);setLoaded(true);});
    const onRec=recRef.on("value",s=>{setRecurring(s.val()?Object.values(s.val()):[]);});
    const onShop=shopRef.on("value",s=>{setShoppingList(s.val()?Object.values(s.val()):[]);});
    return()=>{rRef.off("value",onR);recRef.off("value",onRec);shopRef.off("value",onShop);};
  },[user]);
  const saveReceipts=useCallback(data=>{if(!user)return;const o={};data.forEach(r=>{o[r.id]=r;});fbDb.ref("users/"+user.uid+"/receipts").set(o);},[user]);
  const saveRecurring=useCallback(data=>{if(!user)return;const o={};data.forEach(r=>{o[r.id]=r;});fbDb.ref("users/"+user.uid+"/recurring").set(o);},[user]);
  const saveShoppingList=useCallback(data=>{if(!user)return;const o={};data.forEach(r=>{o[r.id]=r;});fbDb.ref("users/"+user.uid+"/shopping").set(o);},[user]);
  return{receipts,recurring,shoppingList,loaded,saveReceipts,saveRecurring,saveShoppingList};
}

/* ─── Date grouping helper for charts ─── */
function groupByGranularity(receipts, granularity, filterCat) {
  const groups = {};
  receipts.forEach(r => {
    const d = new Date(r.date);
    let key;
    if (granularity === "day") key = r.date;
    else if (granularity === "week") {
      const wd = new Date(d); wd.setDate(d.getDate() - d.getDay() + 1);
      key = wd.toISOString().slice(0, 10);
    } else if (granularity === "month") key = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
    else key = String(d.getFullYear());

    if (!groups[key]) groups[key] = 0;
    if (filterCat === "all") {
      groups[key] += (r.total || 0);
    } else {
      (r.items || []).forEach(it => {
        if (it.category === filterCat) groups[key] += (it.price || 0) * (it.qty || 1);
      });
    }
  });
  return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0])).map(([k, v]) => {
    let label = k;
    if (granularity === "month") { const [y, m] = k.split("-"); label = MONTHS_PL[Number(m)-1] + " " + y; }
    else if (granularity === "week") label = "Tydz. " + k.slice(5);
    else if (granularity === "year") label = k;
    return { name: label, kwota: Math.round(v * 100) / 100 };
  });
}

  const[editingItem,setEditingItem]=useState(null);const[newShopItem,setNewShopItem]=useState("");

  const[searchQuery,setSearchQuery]=useState("");const[filterYear,setFilterYear]=useState("all");
  const[scanPreview,setScanPreview]=useState(null);const[apiKey,setApiKey]=useState("");const[showSettings,setShowSettings]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);const[showInstallBanner,setShowInstallBanner]=useState(false);const fileRef=useRef(null);
  /* chart controls */
  const[chartGran,setChartGran]=useState("month");const[chartCat,setChartCat]=useState("all");

  useEffect(()=>{const k=localStorage.getItem("fin-api-key");if(k)setApiKey(k);},[]);
  const saveApiKey=k=>{setApiKey(k);if(k)localStorage.setItem("fin-api-key",k);else localStorage.removeItem("fin-api-key");};
  useEffect(()=>{const h=e=>{e.preventDefault();setDeferredPrompt(e);if(!localStorage.getItem("pwa-install-dismissed"))setShowInstallBanner(true);};window.addEventListener("beforeinstallprompt",h);return()=>window.removeEventListener("beforeinstallprompt",h);},[]);
  const installPWA=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==="accepted")setShowInstallBanner(false);setDeferredPrompt(null);};
  const dismissInstall=()=>{setShowInstallBanner(false);localStorage.setItem("pwa-install-dismissed","true");};

  const exportData=()=>{const d={receipts,recurring,shoppingList,exportedAt:new Date().toISOString(),version:2};const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="finanse-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u);};
  const importData=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.receipts)saveReceipts(d.receipts);if(d.recurring)saveRecurring(d.recurring);if(d.shoppingList)saveShoppingList(d.shoppingList);alert("Import: "+(d.receipts?.length||0)+" paragonów");}catch(err){alert("Błąd: "+err.message);}};r.readAsText(f);e.target.value="";};

  const SCAN_CATS="Spożywcze, Mięso, Wędliny, Nabiał, Pieczywo, Warzywa, Owoce, Napoje, Woda, Energetyki, Kawa, Alkohol, Piwo, Papierosy, Słodycze, Chipsy/Przekąski, Chemia domowa, Kosmetyki, Apteka/Leki, Elektronika, Odzież, Restauracja, Fast food, Transport, Paliwo, Dom, Inne";
  const CONFIDENCE_THRESHOLD=65;

  const scanReceipt=async(base64,mime)=>{
    if(!apiKey){setShowSettings(true);setScanMsg("");setScanning(false);return;}
    setScanning(true);setScanMsg("📸 Lokalne OCR (Tesseract)...");
    try{
      // STEP 1: Tesseract.js local OCR
      const imgSrc="data:"+mime+";base64,"+base64;
      const tResult=await Tesseract.recognize(imgSrc,"pol",{logger:m=>{if(m.status==="recognizing text")setScanMsg("📸 OCR: "+Math.round((m.progress||0)*100)+"%");}});
      const ocrText=tResult?.data?.text||"";
      const confidence=tResult?.data?.confidence||0;
      console.log("Tesseract confidence:",confidence,"text length:",ocrText.length);

      let geminiModel,geminiBody;
      if(confidence>=CONFIDENCE_THRESHOLD&&ocrText.length>=20){
        // HIGH CONFIDENCE: send only text to Gemini (light request)
        setScanMsg("🤖 AI kategoryzuje produkty...");
        geminiModel="gemini-2.5-flash";
        geminiBody={contents:[{parts:[{text:'Oto tekst z paragonu (OCR):\n\n'+ocrText+'\n\nPrzeanalizuj i odpowiedz WYŁĄCZNIE JSON (bez markdown):\n{"store":"sklep","date":"YYYY-MM-DD","total":0.00,"items":[{"name":"produkt","price":0.00,"qty":1,"category":"kat"}]}\nZASADY: price=cena jednostkowa PO RABACIE w PLN. qty>=1. total=DO ZAPŁATY (SUMA/ŁĄCZNIE). Suma price*qty musi wynosic ok total. Ignoruj kody kreskowe i NIP. Kategorie: '+SCAN_CATS+'.'}]}],generationConfig:{temperature:0.1}};
      }else{
        // LOW CONFIDENCE: send image to Gemini (full analysis)
        setScanMsg("📷 OCR słaby ("+Math.round(confidence)+"%), AI analizuje zdjęcie...");
        geminiModel="gemini-2.5-flash";
        geminiBody={contents:[{parts:[{inlineData:{mimeType:mime,data:base64}},{text:'Przeanalizuj paragon ze zdjęcia. Odpowiedz WYŁĄCZNIE JSON (bez markdown):\n{"store":"sklep","date":"YYYY-MM-DD","total":0.00,"items":[{"name":"produkt","price":0.00,"qty":1,"category":"kat"}]}\nZASADY: price=cena jednostkowa PO RABACIE w PLN. qty>=1. total=DO ZAPŁATY. Suma price*qty musi wynosic ok total. Kategorie: '+SCAN_CATS+'.'}]}],generationConfig:{temperature:0.1}};
      }

      // STEP 2: Gemini
      const resp=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+geminiModel+":generateContent?key="+apiKey,{
        method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(geminiBody)
      });
      const data=await resp.json();
      if(data.error){setScanMsg("❌ AI: "+(data.error.message||"Błąd"));setTimeout(()=>{setScanning(false);setScanMsg("");},5000);return;}
      const text=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("");
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      if(parsed.error){setScanMsg("⚠️ "+parsed.error);setTimeout(()=>{setScanning(false);setScanMsg("");},5000);return;}
      const newR={id:genId(),store:parsed.store||"?",date:parsed.date||new Date().toISOString().slice(0,10),total:parsed.total||0,owner:"Ja",items:(parsed.items||[]).map(it=>{let p=Number(it.price)||0;if(p>5000)p=0;return{name:it.name,price:p,qty:Math.max(1,Math.round(Number(it.qty)||1)),category:CATS.includes(it.category)?it.category:"Inne"};}),addedAt:new Date().toISOString(),quality:confidence>=CONFIDENCE_THRESHOLD?"good":"partial",ocrConfidence:Math.round(confidence)};
      if(parsed.warnings&&parsed.warnings.length>0)newR.warnings=parsed.warnings;
      const iS=newR.items.reduce((s,i)=>s+i.price*i.qty,0);
      if(!newR.total||newR.total<=0)newR.total=iS;
      if(iS>0&&newR.total>0){const ratio=iS/newR.total;if(ratio>1.1||ratio<0.9){const sc=newR.total/iS;newR.items=newR.items.map(it=>({...it,price:Math.round(it.price*sc*100)/100}));}}
      setScanPreview(newR);setScanning(false);setScanMsg("");
    }catch(e){console.error(e);setScanMsg("❌ "+e.message);setTimeout(()=>{setScanning(false);setScanMsg("");},4000);}
  };
  const handleFile=e=>{const f=e.target.files?.[0];if(!f)return;e.target.value="";if(!apiKey){setShowSettings(true);return;}const r=new FileReader();r.onload=()=>{const res=r.result;scanReceipt(res.split(",")[1],res.split(";")[0].split(":")[1]);};r.readAsDataURL(f);};
  const acceptScan=()=>{if(!scanPreview)return;try{const clean=JSON.parse(JSON.stringify(scanPreview));const newList=[clean,...receipts];const obj={};newList.forEach(r=>{obj[r.id]=r;});fbDb.ref("users/"+user.uid+"/receipts").set(obj).then(()=>{setScanPreview(null);setTab("receipts");}).catch(err=>{alert("Firebase: "+err.message);});}catch(e){alert("Błąd: "+e.message);}};

  const addManual=()=>{const r={id:genId(),store:manualForm.store||"Ręczny",date:manualForm.date||new Date().toISOString().slice(0,10),total:Number(manualForm.total)||manualForm.items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0),owner:manualForm.owner,items:manualForm.items.filter(i=>i.name).map(i=>({name:i.name,price:Number(i.price)||0,qty:Number(i.qty)||1,category:i.category})),addedAt:new Date().toISOString()};const clean=JSON.parse(JSON.stringify(r));saveReceipts([clean,...receipts]);setShowManual(false);setManualForm({store:"",date:"",owner:"Ja",total:"",items:[{name:"",price:"",qty:1,category:"Spożywcze"}]});setTab("receipts");};

  if(!user)return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.text1,fontFamily:"system-ui"}}><div style={{textAlign:"center",padding:"0 32px",maxWidth:400}}><div style={{fontSize:64,marginBottom:20}}>💰</div><h1 style={{margin:0,fontSize:28,fontWeight:800,background:"linear-gradient(135deg,"+T.text1+","+T.accent+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Finanse</h1><div style={{fontSize:13,color:T.text3,margin:"8px 0 32px",lineHeight:1.5}}>Tracker wydatków z AI skanowaniem paragonów.<br/>Synchronizacja między urządzeniami.</div><button onClick={signIn} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,width:"100%",padding:"14px 24px",borderRadius:14,border:"1px solid "+T.border2,background:T.card,color:T.text1,fontSize:15,fontWeight:700,cursor:"pointer",touchAction:"manipulation"}}><svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Zaloguj się przez Google</button></div></div>);

  if(!loaded)return(<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.text1,fontFamily:"system-ui"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:16,animation:"pulse 2s ease infinite"}}>💰</div><div style={{fontSize:13,color:T.text2}}>Synchronizacja...</div></div></div>);

  return(<div style={{minHeight:"100vh",background:T.bg,color:T.text1,fontFamily:"'SF Pro Display',system-ui,sans-serif",paddingBottom:80}}>

      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
        <div><h1 style={{margin:0,fontSize:24,fontWeight:800,background:"linear-gradient(135deg,"+T.text1+","+T.accent+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Finanse</h1><div style={{fontSize:11,color:T.text3,marginTop:3,display:"flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:3,background:T.green,display:"inline-block"}}/>{user.displayName||user.email}</div></div>

        </>)}

        <div style={{marginBottom:12}}><Btn active={false} onClick={()=>setShowManual(true)} style={{width:"100%",textAlign:"center",fontSize:12}}>✏️ Dodaj ręcznie</Btn></div>

              {(r.items||[]).map((it,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<(r.items||[]).length-1?"1px solid "+T.border:"none"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:12}}>{it.name}{it.qty>1?" ×"+it.qty:""}</div><Pill color={CAT_COLORS[it.category]||"#94a3b8"} label={it.category}/></div><div onClick={e=>{e.stopPropagation();setEditingItem({receiptId:r.id,itemIdx:i});}} style={{fontSize:12,fontWeight:700,color:T.accent,cursor:"pointer",padding:"2px 6px"}}>{fmt((it.price||0)*(it.qty||1))} ✏️</div></div>))}
              {confirmDelete===r.id?(<div style={{marginTop:12,display:"flex",gap:8}}><button onClick={e=>{e.stopPropagation();saveReceipts(receipts.filter(r2=>r2.id!==r.id));setConfirmDelete(null);setExpandedId(null);}} style={{flex:1,padding:10,borderRadius:12,border:"none",background:T.red,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Na pewno usuń</button><button onClick={e=>{e.stopPropagation();setConfirmDelete(null);}} style={{flex:1,padding:10,borderRadius:12,border:"1px solid "+T.border2,background:"transparent",color:T.text2,cursor:"pointer",fontSize:12}}>Anuluj</button></div>):(<button onClick={e=>{e.stopPropagation();setConfirmDelete(r.id);}} style={{marginTop:12,width:"100%",padding:10,borderRadius:12,border:"1px solid "+T.red+"25",background:T.red+"08",color:T.red,cursor:"pointer",fontSize:12,fontWeight:700}}>🗑 Usuń</button>)}
            </div>)}
          </Card>
        ))}
      </>)}

      {tab==="recurring"&&(<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div><div style={{fontSize:16,fontWeight:800}}>Stałe wydatki</div><div style={{fontSize:12,color:T.text3}}>Subskrypcje, rachunki, opłaty</div></div><Btn active onClick={()=>setShowRecurringForm(true)} style={{fontSize:12}}>+ Dodaj</Btn></div>
        {recurring.length>0&&<Card style={{padding:16,marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:T.text2}}>Suma/mies.</span><span style={{fontSize:20,fontWeight:800,color:T.accent}}>{fmt(recurringMonthly)}</span></div></Card>}
        {recurring.length===0?<div style={{textAlign:"center",padding:"48px 24px",color:T.text2}}><div style={{fontSize:56,marginBottom:16}}>🔄</div><div style={{fontSize:16,fontWeight:700,color:T.text1}}>Brak stałych wydatków</div></div>:recurring.map(r=>(
          <Card key={r.id} style={{padding:"12px 14px",marginBottom:8,opacity:r.active?1:0.5}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{r.name}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,flexWrap:"wrap"}}><Pill color={CAT_COLORS[r.category]||"#94a3b8"} label={r.category}/><span style={{fontSize:11,color:T.text3}}>{FREQ_LABELS[r.frequency]}</span>{r.payDay&&<span style={{fontSize:11,color:T.text2}}>📅 {r.payDay}. dnia</span>}<Pill color={r.owner==="Ja"?T.blue:r.owner==="Ona"?T.pink:T.purple} label={r.owner}/></div></div><div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:800,color:T.accent}}>{fmt(r.amount)}</div><div style={{display:"flex",gap:8,marginTop:4,justifyContent:"flex-end"}}><button onClick={()=>toggleRecurring(r.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:0}}>{r.active?"⏸":"▶️"}</button><button onClick={()=>deleteRecurring(r.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0,color:T.red}}>🗑</button></div></div></div></Card>
        ))}
        {showRecurringForm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:998,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={()=>setShowRecurringForm(false)}><div style={{background:T.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"85vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"0 0 20px",fontSize:18,fontWeight:800}}>Nowy stały wydatek</h3><div style={{display:"flex",flexDirection:"column",gap:12}}><Input placeholder="Nazwa (np. Internet, Czynsz, Netflix)" value={recurForm.name} onChange={e=>setRecurForm({...recurForm,name:e.target.value})}/><Input placeholder="Kwota" type="number" step="0.01" value={recurForm.amount} onChange={e=>setRecurForm({...recurForm,amount:e.target.value})}/><div style={{display:"flex",gap:8}}><Select value={recurForm.frequency} onChange={e=>setRecurForm({...recurForm,frequency:e.target.value})} style={{flex:1}}>{Object.entries(FREQ_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</Select><Select value={recurForm.owner} onChange={e=>setRecurForm({...recurForm,owner:e.target.value})} style={{flex:1}}>{OWNERS.map(o=><option key={o} value={o}>{o}</option>)}</Select></div><Select value={recurForm.category} onChange={e=>setRecurForm({...recurForm,category:e.target.value})} style={{width:"100%"}}>{CATS.map(c=><option key={c} value={c}>{c}</option>)}</Select><Input placeholder="Dzień płatności (1-31, opcjonalne)" type="number" min="1" max="31" value={recurForm.payDay} onChange={e=>setRecurForm({...recurForm,payDay:e.target.value})}/><div style={{display:"flex",gap:8}}><Btn active={false} onClick={()=>setShowRecurringForm(false)} style={{flex:1,textAlign:"center"}}>Anuluj</Btn><Btn active onClick={addRecurring} style={{flex:1,textAlign:"center"}}>Dodaj</Btn></div></div></div></div>)}
      </>)}

      {tab==="shopping"&&(<>
        <div style={{marginBottom:14}}><div style={{fontSize:16,fontWeight:800}}>Lista zakupów</div><div style={{fontSize:12,color:T.text3}}>Synchronizowana w czasie rzeczywistym</div></div>
        <div style={{display:"flex",gap:8,marginBottom:14}}><Input placeholder="Dodaj produkt..." value={newShopItem} onChange={e=>setNewShopItem(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addShopItem();}} style={{flex:1}}/><Btn active onClick={addShopItem} style={{flexShrink:0,fontSize:18,padding:"8px 14px"}}>+</Btn></div>
        {shoppingList.length===0?<div style={{textAlign:"center",padding:"48px 24px",color:T.text2}}><div style={{fontSize:56,marginBottom:16}}>🛒</div><div style={{fontSize:16,fontWeight:700,color:T.text1}}>Pusta</div></div>:(<>
          {shoppingList.filter(i=>!i.checked).map(item=>(<Card key={item.id} style={{padding:"12px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12}}><div onClick={()=>toggleShopItem(item.id)} style={{width:24,height:24,borderRadius:8,border:"2px solid "+T.border2,cursor:"pointer",flexShrink:0}}/><div style={{flex:1,fontSize:14,fontWeight:600}}>{item.name}</div><button onClick={()=>removeShopItem(item.id)} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18}}>×</button></Card>))}
          {shoppingList.filter(i=>i.checked).length>0&&(<><div style={{display:"flex",justifyContent:"space-between",margin:"14px 0 8px"}}><span style={{fontSize:12,color:T.text3,fontWeight:600}}>Kupione ({shoppingList.filter(i=>i.checked).length})</span><button onClick={clearChecked} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:11,fontWeight:600}}>Wyczyść</button></div>{shoppingList.filter(i=>i.checked).map(item=>(<Card key={item.id} style={{padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12,opacity:0.5}}><div onClick={()=>toggleShopItem(item.id)} style={{width:24,height:24,borderRadius:8,background:T.green,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:14,fontWeight:700}}>✓</span></div><div style={{flex:1,fontSize:14,textDecoration:"line-through",color:T.text3}}>{item.name}</div><button onClick={()=>removeShopItem(item.id)} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18}}>×</button></Card>))}</>)}
        </>)}
      </>)}
    </div>

    {/* SCAN PREVIEW */}
    {scanPreview&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={rejectScan}><div style={{background:T.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"90vh",overflow:"auto",padding:20}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:800}}>📷 Podgląd skanu</h3><div style={{display:"flex",gap:8,marginBottom:12}}><div style={{flex:1}}><div style={{fontSize:10,color:T.text3,textTransform:"uppercase"}}>Sklep</div><Input value={scanPreview.store} onChange={e=>updatePreviewField("store",e.target.value)} style={{fontSize:12,padding:"8px 10px"}}/></div><div style={{flex:1}}><div style={{fontSize:10,color:T.text3,textTransform:"uppercase"}}>Data</div><Input type="date" value={scanPreview.date} onChange={e=>updatePreviewField("date",e.target.value)} style={{fontSize:12,padding:"8px 10px"}}/></div></div><div style={{display:"flex",gap:8,marginBottom:12}}><div style={{flex:1}}><div style={{fontSize:10,color:T.text3,textTransform:"uppercase"}}>Kto</div><Select value={scanPreview.owner} onChange={e=>updatePreviewField("owner",e.target.value)} style={{width:"100%",fontSize:12}}>{OWNERS.map(o=><option key={o} value={o}>{o}</option>)}</Select></div><div style={{flex:1}}><div style={{fontSize:10,color:T.text3,textTransform:"uppercase"}}>Suma</div><div style={{fontSize:20,fontWeight:800,color:T.accent,padding:"6px 0"}}>{fmt(scanPreview.total)}</div></div></div><div style={{fontSize:12,fontWeight:700,marginBottom:8,color:T.text2}}>Pozycje ({(scanPreview.items||[]).length})</div><div style={{maxHeight:280,overflow:"auto",marginBottom:14}}>{(scanPreview.items||[]).map((it,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:"1px solid "+T.border}}><div style={{flex:2,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{it.name}{it.qty>1?" ×"+it.qty:""}</div><Select value={it.category} onChange={e=>updatePreviewItem(i,"category",e.target.value)} style={{fontSize:10,padding:"2px 6px",marginTop:3,paddingRight:22}}>{CATS.map(c=><option key={c} value={c}>{c}</option>)}</Select></div><Input type="number" step="0.01" value={it.price} onChange={e=>updatePreviewItem(i,"price",e.target.value)} style={{width:70,flex:"none",padding:"6px 8px",fontSize:12,textAlign:"right"}}/><button onClick={()=>removePreviewItem(i)} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button></div>))}</div><div style={{display:"flex",gap:8,position:"relative",zIndex:10}}><button onClick={rejectScan} style={{flex:1,padding:14,borderRadius:12,border:"1px solid "+T.border2,background:T.card2,color:T.text2,cursor:"pointer",fontSize:14,fontWeight:700,touchAction:"manipulation"}}>Odrzuć</button><button onClick={acceptScan} style={{flex:1,padding:14,borderRadius:12,border:"none",background:"linear-gradient(135deg,"+T.accent+","+T.accent2+")",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,touchAction:"manipulation"}}>✅ Zapisz</button></div></div></div>)}

    {/* MANUAL ADD */}
    {showManual&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:998,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={()=>setShowManual(false)}><div style={{background:T.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"85vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"0 0 20px",fontSize:18,fontWeight:800}}>Dodaj ręcznie</h3><div style={{display:"flex",flexDirection:"column",gap:12}}><Input placeholder="Sklep" value={manualForm.store} onChange={e=>setManualForm({...manualForm,store:e.target.value})}/><div style={{display:"flex",gap:8}}><Input type="date" value={manualForm.date} onChange={e=>setManualForm({...manualForm,date:e.target.value})} style={{flex:1}}/><Select value={manualForm.owner} onChange={e=>setManualForm({...manualForm,owner:e.target.value})} style={{flex:1}}>{OWNERS.map(o=><option key={o}>{o}</option>)}</Select></div><Input placeholder="Kwota" type="number" step="0.01" value={manualForm.total} onChange={e=>setManualForm({...manualForm,total:e.target.value})}/><div style={{fontSize:13,fontWeight:700}}>Produkty:</div>{manualForm.items.map((item,idx)=>(<div key={idx} style={{display:"flex",gap:6}}><Input placeholder="Nazwa" value={item.name} onChange={e=>{const items=[...manualForm.items];items[idx].name=e.target.value;setManualForm({...manualForm,items});}} style={{flex:2}}/><Input placeholder="Cena" type="number" step="0.01" value={item.price} onChange={e=>{const items=[...manualForm.items];items[idx].price=e.target.value;setManualForm({...manualForm,items});}} style={{flex:1}}/><Select value={item.category} onChange={e=>{const items=[...manualForm.items];items[idx].category=e.target.value;setManualForm({...manualForm,items});}} style={{flex:1,fontSize:10}}>{CATS.map(c=><option key={c}>{c}</option>)}</Select></div>))}<Btn active={false} onClick={()=>setManualForm({...manualForm,items:[...manualForm.items,{name:"",price:"",qty:1,category:"Spożywcze"}]})} style={{fontSize:12,textAlign:"center"}}>+ Produkt</Btn><div style={{display:"flex",gap:8}}><Btn active={false} onClick={()=>setShowManual(false)} style={{flex:1,textAlign:"center"}}>Anuluj</Btn><Btn active onClick={addManual} style={{flex:1,textAlign:"center"}}>Dodaj</Btn></div></div></div></div>)}

    {/* SETTINGS */}
    {showSettings&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:998,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={()=>setShowSettings(false)}><div style={{background:T.card,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,maxHeight:"85vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"0 0 20px",fontSize:18,fontWeight:800}}>⚙️ Ustawienia</h3><div style={{display:"flex",flexDirection:"column",gap:16}}><div><div style={{fontSize:13,fontWeight:700,marginBottom:6}}>👤 Konto</div><div style={{fontSize:12,color:T.text2,marginBottom:6}}>{user.displayName} ({user.email})</div><Btn active={false} onClick={()=>{signOut();setShowSettings(false);}} style={{fontSize:12,width:"100%",textAlign:"center"}}>Wyloguj</Btn></div><div><div style={{fontSize:13,fontWeight:700,marginBottom:6}}>🔑 Klucz API Gemini</div><div style={{fontSize:11,color:T.text3,marginBottom:8}}>Darmowy ~500 skanów/dzień. <span style={{color:T.accent}}>aistudio.google.com</span></div><Input type="password" placeholder="AIzaSy..." value={apiKey} onChange={e=>saveApiKey(e.target.value)} style={{fontSize:12}}/>{apiKey&&<div style={{fontSize:11,color:T.green,marginTop:4}}>✅ Zapisany</div>}</div><div><div style={{fontSize:13,fontWeight:700,marginBottom:6}}>💾 Backup</div><div style={{display:"flex",gap:8}}><Btn active onClick={exportData} style={{flex:1,textAlign:"center",fontSize:12}}>📤 Eksport</Btn><label style={{flex:1}}><Btn active={false} style={{width:"100%",textAlign:"center",fontSize:12,cursor:"pointer"}} onClick={()=>{}}>📥 Import</Btn><input type="file" accept=".json" onChange={importData} style={{display:"none"}}/></label></div></div>{deferredPrompt&&<div><Btn active onClick={installPWA} style={{width:"100%",textAlign:"center",fontSize:12}}>📱 Zainstaluj</Btn></div>}<Btn active={false} onClick={()=>setShowSettings(false)} style={{textAlign:"center"}}>Zamknij</Btn></div></div></div>)}

    <div className={"pwa-banner"+(showInstallBanner?" show":"")}><span style={{fontSize:28}}>📱</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.text1}}>Zainstaluj Finanse</div></div><Btn active onClick={installPWA} style={{fontSize:11,padding:"6px 12px"}}>Instaluj</Btn><button onClick={dismissInstall} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:18}}>×</button></div>

    <div style={{position:"fixed",bottom:0,left:0,right:0,height:64,background:T.card+"f0",borderTop:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:90,backdropFilter:"blur(20px)",paddingBottom:"max(4px,env(safe-area-inset-bottom))"}}>
      {TABS.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{background:"none",border:"none",cursor:"pointer",textAlign:"center",fontSize:10,fontWeight:700,color:tab===t.key?T.accent:T.text3,padding:"6px 0",minWidth:56}}><div style={{fontSize:22,marginBottom:2,transform:tab===t.key?"scale(1.15)":"scale(1)",transition:"transform .2s"}}>{t.icon}</div>{t.label}{tab===t.key&&<div style={{width:4,height:4,borderRadius:2,background:T.accent,margin:"3px auto 0"}}/>}</button>))}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<FinanseApp/>);
  </script>
  <script>
    if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').then(r=>console.log('SW:',r.scope)).catch(e=>console.log('SW fail:',e));});}
    setTimeout(()=>{const r=document.getElementById('root');if(r&&!r.hasChildNodes())r.innerHTML='<div style="color:#f97316;text-align:center;padding:60px 24px;font-family:system-ui"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:16px;font-weight:700">Błąd ładowania</div><button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#f97316;color:#fff;border:none;border-radius:12px;cursor:pointer">Odśwież</button></div>';},8000);
  </script>
</body>
</html>
